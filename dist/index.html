<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La Ruta Maya Prize Board</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Belikin La Ruta Maya Prize Board</h1>
      <p class="muted">Daily station prizes and overall prizes. Winner columns are ready to fill at the end of each day.</p>
    </header>

    <div id="tabs" class="tabs"></div>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Location / Item</th>
              <th>Place</th>
              <th>Code</th>
              <th>Prize</th>
              <th>Prize Sponsor</th>
              <th>Winner Team Name</th>
              <th>Team #</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
