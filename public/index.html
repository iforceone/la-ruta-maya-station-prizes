<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La Ruta Maya Prize Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <img src="/larutamaya2026.webp" alt="La Ruta Maya" class="logo" />
      <div class="hero-text">
        <h1>Station Prize Board</h1>
        <p class="muted">Daily station prizes and overall rewards. Winning teams will be celebrated here as each day's results are confirmed.</p>
      </div>
    </header>

    <div class="toolbar">
      <div id="tabs" class="tabs"></div>
    </div>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Location / Item</th>
              <th>Place</th>
              <th>Code</th>
              <th>Prize</th>
              <th>Prize Sponsor</th>
              <th>Winner Team Name</th>
              <th>Team #</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
